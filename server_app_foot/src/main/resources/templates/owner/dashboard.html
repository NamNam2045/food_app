<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{owner/layout}">
<head><title>Dashboard — Owner Portal</title></head>
<body>
<div layout:fragment="content">

    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h4 class="mb-0 fw-bold" th:text="${restaurant != null ? restaurant.name : 'Chưa có nhà hàng'}">Nhà hàng</h4>
            <p class="text-muted mb-0" style="font-size:.85rem;"
               th:text="${restaurant != null ? restaurant.streetAddress + ', ' + restaurant.city : ''}"></p>
        </div>
        <div th:if="${restaurant != null}">
            <span th:class="${'badge fs-6 ' + (restaurant.open ? 'bg-success' : 'bg-secondary')}"
                  th:text="${restaurant.open ? 'Đang mở' : 'Đóng cửa'}"></span>
        </div>
    </div>

    <div th:if="${restaurant == null}" class="alert alert-warning">
        <i class="bi bi-exclamation-triangle me-2"></i>
        Tài khoản của bạn chưa được gắn với nhà hàng nào. Vui lòng liên hệ quản trị.
    </div>

    <div th:if="${restaurant != null}">
        <div class="card border-0 shadow-sm mb-4" style="border-radius:12px;">
            <div class="card-header bg-white border-0 pt-3 pb-0">
                <h6 class="fw-bold mb-0">
                    <i class="bi bi-image me-2 text-success"></i>Quản lý ảnh quán (logo/banner)
                </h6>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-lg-4">
                        <label class="form-label fw-semibold mb-1">Logo</label>
                        <div class="mb-2">
                            <img th:if="${restaurant.logoUrl}"
                                 th:src="${restaurant.logoUrl}"
                                 alt="logo quán"
                                 class="rounded border"
                                 style="width:96px;height:96px;object-fit:cover;"/>
                            <div th:unless="${restaurant.logoUrl}"
                                 class="rounded border d-inline-flex align-items-center justify-content-center text-muted"
                                 style="width:96px;height:96px;">
                                <i class="bi bi-image"></i>
                            </div>
                        </div>
                        <form method="post" enctype="multipart/form-data"
                              th:action="@{/owner/dashboard/logo}"
                              class="d-flex gap-2 mb-2">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="restaurantId" th:value="${restaurant.id}"/>
                            <input type="file" name="imageFile" accept="image/*"
                                   class="form-control form-control-sm" required>
                            <button type="submit" class="btn btn-sm btn-outline-success">
                                <i class="bi bi-upload"></i>
                            </button>
                        </form>
                        <form method="post"
                              th:action="@{/owner/dashboard/logo/remove}"
                              onsubmit="return confirm('Xóa logo quán?')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="restaurantId" th:value="${restaurant.id}"/>
                            <button type="submit" class="btn btn-sm btn-outline-secondary">
                                <i class="bi bi-trash3 me-1"></i>Xóa logo
                            </button>
                        </form>
                    </div>
                    <div class="col-lg-8">
                        <label class="form-label fw-semibold mb-1">Banner</label>
                        <div class="mb-2">
                            <img th:if="${restaurant.bannerUrl}"
                                 th:src="${restaurant.bannerUrl}"
                                 alt="banner quán"
                                 class="rounded border w-100"
                                 style="height:120px;object-fit:cover;"/>
                            <div th:unless="${restaurant.bannerUrl}"
                                 class="rounded border d-flex align-items-center justify-content-center text-muted w-100"
                                 style="height:120px;">
                                <i class="bi bi-image"></i>
                            </div>
                        </div>
                        <form method="post" enctype="multipart/form-data"
                              th:action="@{/owner/dashboard/banner}"
                              class="d-flex gap-2 mb-2">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="restaurantId" th:value="${restaurant.id}"/>
                            <input type="file" name="imageFile" accept="image/*"
                                   class="form-control form-control-sm" required>
                            <button type="submit" class="btn btn-sm btn-outline-success">
                                <i class="bi bi-upload"></i>
                            </button>
                        </form>
                        <form method="post"
                              th:action="@{/owner/dashboard/banner/remove}"
                              onsubmit="return confirm('Xóa banner quán?')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="restaurantId" th:value="${restaurant.id}"/>
                            <button type="submit" class="btn btn-sm btn-outline-secondary">
                                <i class="bi bi-trash3 me-1"></i>Xóa banner
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Stats row -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-lg-3">
                <div class="card stat-card p-3 h-100">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <p class="text-muted mb-1" style="font-size:.8rem;">Tổng đơn</p>
                            <h3 class="fw-bold mb-0" th:text="${stats.totalOrders}">0</h3>
                        </div>
                        <div class="icon-box" style="background:#e8f5e9;">
                            <i class="bi bi-bag-check" style="color:#27ae60;font-size:1.3rem;"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-lg-3">
                <div class="card stat-card p-3 h-100">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <p class="text-muted mb-1" style="font-size:.8rem;">Chờ xử lý</p>
                            <h3 class="fw-bold mb-0 text-warning" th:text="${stats.pendingOrders}">0</h3>
                        </div>
                        <div class="icon-box" style="background:#fff3e0;">
                            <i class="bi bi-clock" style="color:#e67e22;font-size:1.3rem;"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-lg-3">
                <div class="card stat-card p-3 h-100">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <p class="text-muted mb-1" style="font-size:.8rem;">Doanh thu</p>
                            <h4 class="fw-bold mb-0" style="font-size:1.1rem;">
                                <span th:text="${#numbers.formatDecimal(stats.totalRevenue, 0, 'COMMA', 0, 'POINT')}">0</span>đ
                            </h4>
                            <small class="text-muted">Hôm nay:
                                <span th:text="${#numbers.formatDecimal(stats.todayRevenue, 0, 'COMMA', 0, 'POINT')} + 'đ'"></span>
                            </small>
                        </div>
                        <div class="icon-box" style="background:#fce4ec;">
                            <i class="bi bi-currency-exchange" style="color:#c0392b;font-size:1.3rem;"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-lg-3">
                <div class="card stat-card p-3 h-100">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <p class="text-muted mb-1" style="font-size:.8rem;">Đánh giá</p>
                            <h3 class="fw-bold mb-0" th:text="${stats.totalReviews}">0</h3>
                            <small class="text-warning">
                                <i class="bi bi-star-fill" style="font-size:.7rem;"></i>
                                <span th:text="${#numbers.formatDecimal(stats.avgRating, 1, 'POINT', 1, 'POINT')}">0.0</span>
                            </small>
                        </div>
                        <div class="icon-box" style="background:#e3f2fd;">
                            <i class="bi bi-star" style="color:#2980b9;font-size:1.3rem;"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recent orders -->
        <div class="card border-0 shadow-sm" style="border-radius:12px;">
            <div class="card-header bg-white border-0 pt-3 pb-0">
                <h6 class="fw-bold mb-0"><i class="bi bi-clock-history me-2 text-success"></i>Đơn hàng gần đây</h6>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Mã đơn</th>
                                <th>Khách hàng</th>
                                <th>Tổng tiền</th>
                                <th>Trạng thái</th>
                                <th>Thời gian</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${stats.recentOrders.empty}">
                                <td colspan="6" class="text-center text-muted py-4">Chưa có đơn hàng</td>
                            </tr>
                            <tr th:each="o : ${stats.recentOrders}">
                                <td class="fw-semibold" th:text="${o.orderNumber}"></td>
                                <td th:text="${o.user.firstName + ' ' + o.user.lastName}"></td>
                                <td class="fw-semibold text-success">
                                    <span th:text="${#numbers.formatDecimal(o.totalAmount, 0, 'COMMA', 0, 'POINT') + 'đ'}"></span>
                                </td>
                                <td>
                                    <span th:class="${'badge ' +
                                        (o.status.name() == 'DELIVERED' ? 'bg-success' :
                                         o.status.name() == 'CANCELLED' ? 'bg-danger' :
                                         o.status.name() == 'PENDING' ? 'bg-warning text-dark' :
                                         o.status.name() == 'PREPARING' ? 'bg-info' : 'bg-secondary')}"
                                          th:text="${o.status.name()}"></span>
                                </td>
                                <td class="text-muted" style="font-size:.82rem;"
                                    th:text="${#temporals.format(o.createdAt, 'dd/MM HH:mm')}"></td>
                                <td>
                                    <a th:href="@{/owner/orders/{id}(id=${o.id})}"
                                       class="btn btn-sm btn-outline-secondary py-0">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="card-footer bg-white border-0 text-end">
                <a th:href="@{/owner/orders}" class="btn btn-sm btn-outline-success">
                    Xem tất cả đơn hàng <i class="bi bi-arrow-right"></i>
                </a>
            </div>
        </div>
    </div>

</div>
</body>
</html>
