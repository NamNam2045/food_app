<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{owner/layout}">
<head><title>Đơn hàng — Owner Portal</title></head>
<body>
<div layout:fragment="content">

    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h4 class="mb-0 fw-bold">Đơn hàng</h4>
            <p class="text-muted mb-0" style="font-size:.85rem;">Quản lý đơn hàng nhà hàng của bạn</p>
        </div>
    </div>

    <!-- Filter -->
    <div class="card border-0 shadow-sm mb-3" style="border-radius:12px;">
        <div class="card-body py-2">
            <form method="get" th:action="@{/owner/orders}" class="d-flex flex-wrap gap-2 align-items-center">
                <select name="status" class="form-select form-select-sm" style="max-width:180px;">
                    <option value="" th:selected="${selectedStatus == null}">Tất cả trạng thái</option>
                    <option th:each="s : ${allStatuses}" th:value="${s}" th:text="${s}"
                            th:selected="${s == selectedStatus}"></option>
                </select>
                <input type="date" name="date" class="form-control form-control-sm"
                       style="max-width:160px;" th:value="${selectedDate}">
                <button class="btn btn-sm btn-success fw-semibold" type="submit">
                    <i class="bi bi-funnel"></i> Lọc
                </button>
                <a th:href="@{/owner/orders}" class="btn btn-sm btn-outline-secondary">Xóa lọc</a>
            </form>
        </div>
    </div>

    <!-- Table -->
    <div class="card border-0 shadow-sm" style="border-radius:12px;">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Mã đơn</th>
                            <th>Khách hàng</th>
                            <th>Tổng tiền</th>
                            <th>Trạng thái</th>
                            <th>Thời gian</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${orders.empty}">
                            <td colspan="6" class="text-center text-muted py-4">Không có đơn hàng nào</td>
                        </tr>
                        <tr th:each="o : ${orders}">
                            <td class="fw-semibold" th:text="${o.orderNumber}"></td>
                            <td>
                                <div th:text="${o.user.firstName + ' ' + o.user.lastName}" style="font-size:.9rem;"></div>
                                <div class="text-muted" style="font-size:.78rem;" th:text="${o.user.email}"></div>
                            </td>
                            <td class="fw-semibold text-success">
                                <span th:text="${#numbers.formatDecimal(o.totalAmount, 0, 'COMMA', 0, 'POINT') + 'đ'}"></span>
                            </td>
                            <td>
                                <span th:class="${'badge ' +
                                    (o.status.name() == 'DELIVERED' ? 'bg-success' :
                                     o.status.name() == 'CANCELLED' ? 'bg-danger' :
                                     o.status.name() == 'PENDING' ? 'bg-warning text-dark' :
                                     o.status.name() == 'PREPARING' ? 'bg-info' : 'bg-secondary')}"
                                      th:text="${o.status.name()}"></span>
                            </td>
                            <td class="text-muted" style="font-size:.82rem;"
                                th:text="${#temporals.format(o.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                            <td>
                                <a th:href="@{/owner/orders/{id}(id=${o.id})}"
                                   class="btn btn-sm btn-outline-secondary">
                                    <i class="bi bi-eye"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <div class="card-footer bg-white border-0" th:if="${orders.totalPages > 1}">
            <nav>
                <ul class="pagination pagination-sm mb-0 justify-content-end">
                    <li th:class="${'page-item ' + (orders.first ? 'disabled' : '')}">
                        <a class="page-link"
                           th:href="@{/owner/orders(status=${selectedStatus},date=${selectedDate},page=${orders.number - 1})}">&laquo;</a>
                    </li>
                    <li th:each="i : ${#numbers.sequence(0, orders.totalPages - 1)}"
                        th:class="${'page-item ' + (i == orders.number ? 'active' : '')}">
                        <a class="page-link"
                           th:href="@{/owner/orders(status=${selectedStatus},date=${selectedDate},page=${i})}"
                           th:text="${i + 1}"></a>
                    </li>
                    <li th:class="${'page-item ' + (orders.last ? 'disabled' : '')}">
                        <a class="page-link"
                           th:href="@{/owner/orders(status=${selectedStatus},date=${selectedDate},page=${orders.number + 1})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

</div>
</body>
</html>
