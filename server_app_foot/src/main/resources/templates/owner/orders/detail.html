<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{owner/layout}">
<head><title>Chi tiết đơn hàng — Owner Portal</title></head>
<body>
<div layout:fragment="content">

    <div class="d-flex align-items-center gap-2 mb-4">
        <a th:href="@{/owner/orders}" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left"></i>
        </a>
        <div>
            <h4 class="mb-0 fw-bold" th:text="${order.orderNumber}">Đơn hàng</h4>
            <p class="text-muted mb-0" style="font-size:.85rem;"
               th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></p>
        </div>
        <span th:class="${'ms-2 badge fs-6 ' +
            (order.status.name() == 'DELIVERED' ? 'bg-success' :
             order.status.name() == 'CANCELLED' ? 'bg-danger' :
             order.status.name() == 'PENDING' ? 'bg-warning text-dark' :
             order.status.name() == 'PREPARING' ? 'bg-info' : 'bg-secondary')}"
              th:text="${order.status.name()}"></span>
    </div>

    <div class="row g-3">
        <!-- Order items -->
        <div class="col-lg-7">
            <div class="card border-0 shadow-sm mb-3" style="border-radius:12px;">
                <div class="card-header bg-white border-0 pt-3 pb-0">
                    <h6 class="fw-bold mb-0"><i class="bi bi-cart me-2"></i>Món đã đặt</h6>
                </div>
                <div class="card-body p-0">
                    <table class="table mb-0">
                        <thead class="table-light">
                            <tr><th>Món</th><th class="text-center">SL</th><th class="text-end">Thành tiền</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${order.items}">
                                <td>
                                    <div th:text="${item.menuItemName}" class="fw-semibold"></div>
                                    <div th:if="${item.specialInstructions}" class="text-muted"
                                         style="font-size:.78rem;" th:text="${item.specialInstructions}"></div>
                                </td>
                                <td class="text-center" th:text="${item.quantity}"></td>
                                <td class="text-end fw-semibold"
                                    th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT') + 'đ'}"></td>
                            </tr>
                        </tbody>
                        <tfoot>
                            <tr>
                                <td colspan="2" class="text-end text-muted">Tạm tính</td>
                                <td class="text-end" th:text="${#numbers.formatDecimal(order.subtotal, 0, 'COMMA', 0, 'POINT') + 'đ'}"></td>
                            </tr>
                            <tr>
                                <td colspan="2" class="text-end text-muted">Phí giao hàng</td>
                                <td class="text-end" th:text="${#numbers.formatDecimal(order.deliveryFee, 0, 'COMMA', 0, 'POINT') + 'đ'}"></td>
                            </tr>
                            <tr th:if="${order.discountAmount != null and order.discountAmount.compareTo(T(java.math.BigDecimal).ZERO) > 0}">
                                <td colspan="2" class="text-end text-success">Giảm giá</td>
                                <td class="text-end text-success"
                                    th:text="${'-' + #numbers.formatDecimal(order.discountAmount, 0, 'COMMA', 0, 'POINT') + 'đ'}"></td>
                            </tr>
                            <tr class="fw-bold">
                                <td colspan="2" class="text-end">Tổng cộng</td>
                                <td class="text-end text-success"
                                    th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT') + 'đ'}"></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>

        <!-- Side info + status update -->
        <div class="col-lg-5">
            <!-- Customer info -->
            <div class="card border-0 shadow-sm mb-3" style="border-radius:12px;">
                <div class="card-body">
                    <h6 class="fw-bold mb-3"><i class="bi bi-person me-2"></i>Khách hàng</h6>
                    <p class="mb-1 fw-semibold" th:text="${order.user.firstName + ' ' + order.user.lastName}"></p>
                    <p class="mb-1 text-muted" style="font-size:.85rem;" th:text="${order.user.email}"></p>
                    <p class="mb-0 text-muted" style="font-size:.85rem;" th:text="${order.user.phoneNumber}"></p>
                    <hr class="my-2"/>
                    <h6 class="fw-semibold mb-1" style="font-size:.85rem;">Địa chỉ giao</h6>
                    <p class="mb-0 text-muted" style="font-size:.82rem;" th:text="${order.deliveryAddressSnapshot}"></p>
                    <div th:if="${order.specialInstructions}" class="mt-2">
                        <small class="text-muted"><i class="bi bi-chat-left-text me-1"></i>
                            <em th:text="${order.specialInstructions}"></em></small>
                    </div>
                </div>
            </div>

            <!-- Update status -->
            <div class="card border-0 shadow-sm" style="border-radius:12px;"
                 th:if="${order.status.name() == 'PENDING' or order.status.name() == 'CONFIRMED' or order.status.name() == 'PREPARING'}">
                <div class="card-body">
                    <h6 class="fw-bold mb-3"><i class="bi bi-arrow-repeat me-2"></i>Cập nhật trạng thái</h6>
                    <form th:action="@{/owner/orders/{id}/status(id=${order.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="d-grid gap-2">
                            <button th:if="${order.status.name() == 'PENDING'}"
                                    name="newStatus" value="CONFIRMED"
                                    class="btn btn-outline-primary btn-sm" type="submit">
                                <i class="bi bi-check-circle me-1"></i> Xác nhận đơn
                            </button>
                            <button th:if="${order.status.name() == 'CONFIRMED'}"
                                    name="newStatus" value="PREPARING"
                                    class="btn btn-outline-info btn-sm" type="submit">
                                <i class="bi bi-fire me-1"></i> Bắt đầu chuẩn bị
                            </button>
                            <button th:if="${order.status.name() == 'PREPARING'}"
                                    name="newStatus" value="READY_FOR_PICKUP"
                                    class="btn btn-success btn-sm" type="submit">
                                <i class="bi bi-bag-check me-1"></i> Sẵn sàng giao
                            </button>
                            <button th:if="${order.status.name() == 'PENDING'}"
                                    name="newStatus" value="CANCELLED"
                                    class="btn btn-outline-danger btn-sm" type="submit"
                                    onclick="return confirm('Huỷ đơn hàng này?')">
                                <i class="bi bi-x-circle me-1"></i> Huỷ đơn
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
