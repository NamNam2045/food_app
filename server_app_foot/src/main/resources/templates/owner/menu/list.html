<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{owner/layout}">
<head><title>Thực đơn — Owner Portal</title></head>
<body>
<div layout:fragment="content">

    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h4 class="mb-0 fw-bold">Thực đơn</h4>
            <p class="text-muted mb-0" style="font-size:.85rem;">Quản lý món ăn theo từng danh mục</p>
        </div>
    </div>

    <div th:if="${categories.empty}" class="alert alert-info">
        <i class="bi bi-info-circle me-2"></i> Chưa có danh mục thực đơn nào.
    </div>

    <div th:each="cat : ${categories}" class="card border-0 shadow-sm mb-4" style="border-radius:12px;">
        <div class="card-header bg-white border-0 pt-3 pb-0 d-flex align-items-center gap-2">
            <h6 class="fw-bold mb-0" th:text="${cat.name}">Danh mục</h6>
            <span class="badge bg-secondary" th:text="${itemMap[cat.id]?.size() ?: 0} + ' món'"></span>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Tên món</th>
                            <th>Giá</th>
                            <th class="text-center">Khả dụng</th>
                            <th class="text-center">Nổi bật</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${itemMap[cat.id] == null or itemMap[cat.id].empty}">
                            <td colspan="5" class="text-center text-muted py-3">Chưa có món</td>
                        </tr>
                        <tr th:each="item : ${itemMap[cat.id]}">
                            <td>
                                <div class="fw-semibold" th:text="${item.name}"></div>
                                <div class="text-muted" style="font-size:.78rem;"
                                     th:text="${#strings.abbreviate(item.description ?: '', 60)}"></div>
                            </td>
                            <td class="fw-semibold text-success"
                                th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT') + 'đ'}"></td>
                            <td class="text-center">
                                <span th:class="${'badge ' + (item.available ? 'bg-success' : 'bg-danger')}"
                                      th:text="${item.available ? 'Có' : 'Hết'}"></span>
                            </td>
                            <td class="text-center">
                                <i th:class="${item.featured ? 'bi bi-star-fill text-warning' : 'bi bi-star text-muted'}"></i>
                            </td>
                            <td>
                                <form th:action="@{/owner/menu/items/{id}/toggle(id=${item.id})}" method="post" class="d-inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit"
                                            th:class="${'btn btn-sm ' + (item.available ? 'btn-outline-danger' : 'btn-outline-success')}"
                                            th:text="${item.available ? 'Tạm ẩn' : 'Hiển thị'}">
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>
</body>
</html>
