<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>FoodRush Owner</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/32/3075/3075977.png"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>
        :root {
            --sidebar-w: 240px;
            --primary: #27ae60;
            --sidebar-bg: #1b2631;
            --sidebar-text: #c8ccd4;
        }
        body { background: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
        #sidebar {
            width: var(--sidebar-w); min-height: 100vh;
            background: var(--sidebar-bg); position: fixed; top: 0; left: 0; z-index: 1000;
        }
        #sidebar .brand {
            padding: 1.2rem 1rem; font-size: 1.1rem; font-weight: 700; color: #fff;
            border-bottom: 1px solid rgba(255,255,255,.1);
            display: flex; align-items: center; gap: .5rem;
        }
        #sidebar .brand span { color: var(--primary); }
        #sidebar .nav-link {
            color: var(--sidebar-text); padding: .65rem 1.2rem;
            display: flex; align-items: center; gap: .7rem;
            border-radius: 8px; margin: 2px 8px; font-size: .92rem; transition: all .2s;
        }
        #sidebar .nav-link:hover { background: rgba(255,255,255,.08); color: #fff; }
        #sidebar .nav-link.active { background: var(--primary); color: #fff; font-weight: 600; }
        #sidebar .nav-link i { font-size: 1.05rem; flex-shrink: 0; }
        #sidebar .nav-section {
            font-size: .7rem; text-transform: uppercase; letter-spacing: .1em;
            color: rgba(255,255,255,.35); padding: 1rem 1.4rem .3rem;
        }
        #main { margin-left: var(--sidebar-w); min-height: 100vh; }
        .topbar {
            background: #fff; border-bottom: 1px solid #e9ecef;
            padding: .75rem 1.5rem; display: flex; align-items: center;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
        }
        .content-area { padding: 1.5rem; }
        .stat-card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
        .stat-card .icon-box {
            width: 48px; height: 48px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 1.3rem;
        }
        .table th { font-size: .8rem; text-transform: uppercase; letter-spacing: .05em; color: #6c757d; }
        .table td { vertical-align: middle; font-size: .9rem; }
        .pagination .page-link { color: var(--primary); }
        .pagination .page-item.active .page-link { background-color: var(--primary); border-color: var(--primary); }
        .alert { border-radius: 10px; border: none; }
    </style>
</head>
<body>
<div id="sidebar">
    <div class="brand">
        <i class="bi bi-shop text-success"></i>
        Owner<span>Portal</span>
    </div>
    <nav class="pt-2">
        <div class="nav-section">Tổng quan</div>
        <a th:href="@{/owner/dashboard}"
           th:classappend="${activePage == 'dashboard'} ? 'active'" class="nav-link">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>
        <div class="nav-section">Quản lý</div>
        <a th:href="@{/owner/orders}"
           th:classappend="${activePage == 'orders'} ? 'active'" class="nav-link">
            <i class="bi bi-bag-check"></i> Đơn hàng
        </a>
        <a th:href="@{/owner/menu}"
           th:classappend="${activePage == 'menu'} ? 'active'" class="nav-link">
            <i class="bi bi-card-list"></i> Thực đơn
        </a>
        <a th:href="@{/owner/reviews}"
           th:classappend="${activePage == 'reviews'} ? 'active'" class="nav-link">
            <i class="bi bi-star-half"></i> Đánh giá
        </a>
        <div class="nav-section">Tài khoản</div>
        <form th:action="@{/owner/logout}" method="post" class="m-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="nav-link border-0 w-100 text-start"
                    style="background:none; cursor:pointer;">
                <i class="bi bi-box-arrow-left"></i> Đăng xuất
            </button>
        </form>
    </nav>
</div>

<div id="main">
    <div class="topbar">
        <div class="flex-grow-1">
            <span class="text-muted" style="font-size:.85rem;">
                <i class="bi bi-shop me-1"></i> Restaurant Owner Portal
            </span>
        </div>
        <div class="d-flex align-items-center gap-2">
            <div class="bg-success rounded-circle d-flex align-items-center justify-content-center"
                 style="width:32px;height:32px;font-size:.85rem;color:#fff;">
                <i class="bi bi-person-fill"></i>
            </div>
            <span class="fw-semibold" style="font-size:.9rem;" sec:authentication="name">Owner</span>
        </div>
    </div>

    <div class="px-4 pt-3">
        <div th:if="${successMsg}" class="alert alert-success d-flex align-items-center" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${successMsg}"></span>
        </div>
        <div th:if="${errorMsg}" class="alert alert-danger d-flex align-items-center" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${errorMsg}"></span>
        </div>
    </div>

    <div class="content-area" layout:fragment="content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
