<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head><title>Mã khuyến mãi — FoodRush Admin</title></head>
<body>
<div layout:fragment="content">

    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h4 class="mb-0 fw-bold">Mã khuyến mãi</h4>
            <p class="text-muted mb-0" style="font-size:.85rem;">Quản lý promo code toàn hệ thống</p>
        </div>
        <button class="btn btn-warning fw-semibold"
                data-bs-toggle="modal" data-bs-target="#createPromoModal">
            <i class="bi bi-plus-lg me-1"></i>Tạo mã mới
        </button>
    </div>

    <!-- Promo codes table -->
    <div class="card border-0 shadow-sm" style="border-radius:12px;">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Mã code</th>
                            <th>Loại giảm</th>
                            <th>Giá trị</th>
                            <th>Đơn tối thiểu</th>
                            <th>Hiệu lực</th>
                            <th>Đã dùng / Giới hạn</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${promoCodes.empty}">
                            <td colspan="8" class="text-center text-muted py-4">Chưa có mã khuyến mãi nào</td>
                        </tr>
                        <tr th:each="p : ${promoCodes}">
                            <td>
                                <span class="badge bg-dark font-monospace fs-6 fw-bold"
                                      th:text="${p.code}"></span>
                            </td>
                            <td>
                                <span th:class="${'badge ' + (p.discountType == 'PERCENTAGE' ? 'bg-info' : 'bg-warning text-dark')}"
                                      th:text="${p.discountType == 'PERCENTAGE' ? 'Phần trăm' : 'Cố định'}"></span>
                            </td>
                            <td class="fw-semibold">
                                <span th:if="${p.discountType == 'PERCENTAGE'}"
                                      th:text="${p.discountValue + '%'}"></span>
                                <span th:unless="${p.discountType == 'PERCENTAGE'}"
                                      th:text="${#numbers.formatDecimal(p.discountValue, 0, 'COMMA', 0, 'POINT') + 'đ'}"></span>
                            </td>
                            <td th:text="${p.minOrderAmount != null ? #numbers.formatDecimal(p.minOrderAmount, 0, 'COMMA', 0, 'POINT') + 'đ' : '—'}"></td>
                            <td style="font-size:.82rem;">
                                <div th:text="${#temporals.format(p.startDate, 'dd/MM/yy')} + ' → ' + ${#temporals.format(p.endDate, 'dd/MM/yy')}"></div>
                            </td>
                            <td>
                                <span th:text="${p.usedCount + ' / ' + (p.usageLimit != null ? p.usageLimit : '∞')}"></span>
                            </td>
                            <td>
                                <span th:class="${'badge ' + (p.active ? 'bg-success' : 'bg-secondary')}"
                                      th:text="${p.active ? 'Kích hoạt' : 'Tắt'}"></span>
                            </td>
                            <td class="d-flex gap-1">
                                <form method="post"
                                      th:action="@{/admin/promo-codes/{id}/toggle(id=${p.id})}">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit"
                                            th:class="${'btn btn-sm ' + (p.active ? 'btn-outline-secondary' : 'btn-outline-success')}"
                                            th:title="${p.active ? 'Tắt' : 'Bật'}">
                                        <i th:class="${'bi ' + (p.active ? 'bi-toggle-off' : 'bi-toggle-on')}"></i>
                                    </button>
                                </form>
                                <form method="post"
                                      th:action="@{/admin/promo-codes/{id}/delete(id=${p.id})}"
                                      onsubmit="return confirm('Xác nhận xóa mã này?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-outline-danger" title="Xóa">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <div class="card-footer bg-white border-0" th:if="${promoCodes.totalPages > 1}">
            <nav>
                <ul class="pagination pagination-sm mb-0 justify-content-end">
                    <li th:class="${'page-item ' + (promoCodes.first ? 'disabled' : '')}">
                        <a class="page-link"
                           th:href="@{/admin/promo-codes(page=${promoCodes.number - 1})}">&laquo;</a>
                    </li>
                    <li th:each="i : ${#numbers.sequence(0, promoCodes.totalPages - 1)}"
                        th:class="${'page-item ' + (i == promoCodes.number ? 'active' : '')}">
                        <a class="page-link"
                           th:href="@{/admin/promo-codes(page=${i})}"
                           th:text="${i + 1}"></a>
                    </li>
                    <li th:class="${'page-item ' + (promoCodes.last ? 'disabled' : '')}">
                        <a class="page-link"
                           th:href="@{/admin/promo-codes(page=${promoCodes.number + 1})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

    <!-- Create promo modal -->
    <div class="modal fade" id="createPromoModal" tabindex="-1" aria-labelledby="createPromoLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content border-0" style="border-radius:16px;overflow:hidden;">
                <form method="post" th:action="@{/admin/promo-codes/create}" th:object="${newPromo}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="modal-header border-0" style="background:#1a1a2e;">
                        <h5 class="modal-title text-white fw-bold" id="createPromoLabel">
                            <i class="bi bi-ticket-perforated me-2 text-warning"></i>Tạo mã khuyến mãi
                        </h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Mã code <span class="text-danger">*</span></label>
                                <input type="text" class="form-control text-uppercase"
                                       th:field="*{code}"
                                       placeholder="vd: WELCOME20" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Loại giảm <span class="text-danger">*</span></label>
                                <select class="form-select" th:field="*{discountType}" required>
                                    <option value="PERCENTAGE">Phần trăm (%)</option>
                                    <option value="FIXED_AMOUNT">Số tiền cố định (đ)</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Giá trị giảm <span class="text-danger">*</span></label>
                                <input type="number" class="form-control"
                                       th:field="*{discountValue}"
                                       placeholder="vd: 20 hoặc 50000" min="0" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Giảm tối đa (đ)</label>
                                <input type="number" class="form-control"
                                       th:field="*{maxDiscountAmount}"
                                       placeholder="Bỏ trống = không giới hạn" min="0">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Đơn hàng tối thiểu (đ)</label>
                                <input type="number" class="form-control"
                                       th:field="*{minOrderAmount}"
                                       placeholder="Bỏ trống = không yêu cầu" min="0">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Giới hạn sử dụng</label>
                                <input type="number" class="form-control"
                                       th:field="*{usageLimit}"
                                       placeholder="Bỏ trống = không giới hạn" min="1">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Ngày bắt đầu <span class="text-danger">*</span></label>
                                <input type="datetime-local" class="form-control"
                                       th:field="*{startDate}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Ngày kết thúc <span class="text-danger">*</span></label>
                                <input type="datetime-local" class="form-control"
                                       th:field="*{endDate}" required>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer border-0">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-warning fw-semibold">
                            <i class="bi bi-check-lg me-1"></i>Tạo mã
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</div>
</body>
</html>
