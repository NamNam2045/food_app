<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>FoodRush Admin</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/32/3075/3075977.png"/>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>
        :root {
            --sidebar-w: 250px;
            --primary: #e67e22;
            --primary-dark: #d35400;
            --sidebar-bg: #1a1a2e;
            --sidebar-text: #c8ccd4;
            --sidebar-active-bg: #e67e22;
        }
        body { background: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
        /* Sidebar */
        #sidebar {
            width: var(--sidebar-w);
            min-height: 100vh;
            background: var(--sidebar-bg);
            position: fixed;
            top: 0; left: 0;
            z-index: 1000;
            transition: width .25s;
        }
        #sidebar .brand {
            padding: 1.2rem 1rem;
            font-size: 1.25rem;
            font-weight: 700;
            color: #fff;
            border-bottom: 1px solid rgba(255,255,255,.1);
            display: flex; align-items: center; gap: .5rem;
        }
        #sidebar .brand span { color: var(--primary); }
        #sidebar .nav-link {
            color: var(--sidebar-text);
            padding: .65rem 1.2rem;
            display: flex; align-items: center; gap: .7rem;
            border-radius: 8px;
            margin: 2px 8px;
            transition: all .2s;
            font-size: .92rem;
        }
        #sidebar .nav-link:hover { background: rgba(255,255,255,.08); color: #fff; }
        #sidebar .nav-link.active {
            background: var(--sidebar-active-bg);
            color: #fff;
            font-weight: 600;
        }
        #sidebar .nav-link i { font-size: 1.1rem; flex-shrink: 0; }
        #sidebar .nav-section {
            font-size: .7rem;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: rgba(255,255,255,.35);
            padding: 1rem 1.4rem .3rem;
        }
        /* Main content */
        #main { margin-left: var(--sidebar-w); min-height: 100vh; }
        /* Top navbar */
        .topbar {
            background: #fff;
            border-bottom: 1px solid #e9ecef;
            padding: .75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: between;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
        }
        .content-area { padding: 1.5rem; }
        /* Cards */
        .stat-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,.06);
        }
        .stat-card .icon-box {
            width: 52px; height: 52px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
        }
        /* Table */
        .table th { font-size: .8rem; text-transform: uppercase; letter-spacing: .05em; color: #6c757d; }
        .table td { vertical-align: middle; font-size: .9rem; }
        /* Badges */
        .badge-status { font-size: .75rem; padding: .35em .65em; border-radius: 50rem; }
        /* Pagination */
        .pagination .page-link { color: var(--primary); }
        .pagination .page-item.active .page-link { background-color: var(--primary); border-color: var(--primary); }
        /* Alerts */
        .alert { border-radius: 10px; border: none; }
        .toast-container { z-index: 9999; }
    </style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
    <div class="brand">
        <i class="bi bi-fire text-warning"></i>
        Food<span>Rush</span>&nbsp;Admin
    </div>
    <nav class="pt-2">
        <div class="nav-section">Tổng quan</div>
        <a th:href="@{/admin/dashboard}"
           th:classappend="${activePage == 'dashboard'} ? 'active'" class="nav-link">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>

        <div class="nav-section">Quản lý</div>
        <a th:href="@{/admin/users}"
           th:classappend="${activePage == 'users'} ? 'active'" class="nav-link">
            <i class="bi bi-people"></i> Người dùng
        </a>
        <a th:href="@{/admin/restaurants}"
           th:classappend="${activePage == 'restaurants'} ? 'active'" class="nav-link">
            <i class="bi bi-shop"></i> Nhà hàng
        </a>
        <a th:href="@{/admin/orders}"
           th:classappend="${activePage == 'orders'} ? 'active'" class="nav-link">
            <i class="bi bi-bag-check"></i> Đơn hàng
        </a>
        <a th:href="@{/admin/reviews}"
           th:classappend="${activePage == 'reviews'} ? 'active'" class="nav-link">
            <i class="bi bi-star-half"></i> Đánh giá
        </a>
        <a th:href="@{/admin/promo-codes}"
           th:classappend="${activePage == 'promo'} ? 'active'" class="nav-link">
            <i class="bi bi-tag"></i> Mã giảm giá
        </a>

        <div class="nav-section">Hệ thống</div>
        <a href="/swagger-ui/index.html" target="_blank" class="nav-link">
            <i class="bi bi-code-slash"></i> API Docs
        </a>
        <form th:action="@{/admin/logout}" method="post" class="m-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="nav-link border-0 w-100 text-start"
                    style="background:none; cursor:pointer;">
                <i class="bi bi-box-arrow-left"></i> Đăng xuất
            </button>
        </form>
    </nav>
</div>

<!-- Main -->
<div id="main">
    <!-- Topbar -->
    <div class="topbar">
        <div class="flex-grow-1">
            <span class="text-muted" style="font-size:.85rem;">
                <i class="bi bi-house-door me-1"></i>
                Admin Panel
            </span>
        </div>
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-bell text-muted"></i>
            <div class="d-flex align-items-center gap-2 ms-2">
                <div class="bg-warning rounded-circle d-flex align-items-center justify-content-center"
                     style="width:32px;height:32px;font-size:.85rem;color:#fff;">
                    <i class="bi bi-person-fill"></i>
                </div>
                <span class="fw-semibold" style="font-size:.9rem;" sec:authentication="name">Admin</span>
            </div>
        </div>
    </div>

    <!-- Flash messages -->
    <div class="px-4 pt-3">
        <div th:if="${successMsg}" class="alert alert-success d-flex align-items-center" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${successMsg}"></span>
        </div>
        <div th:if="${errorMsg}" class="alert alert-danger d-flex align-items-center" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${errorMsg}"></span>
        </div>
    </div>

    <!-- Page content -->
    <div class="content-area" layout:fragment="content">
        <!-- page content injected here -->
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
