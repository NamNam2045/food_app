<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head><title>Chi tiết nhà hàng — FoodRush Admin</title></head>
<body>
<div layout:fragment="content">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/admin/restaurants}">Nhà hàng</a></li>
            <li class="breadcrumb-item active" th:text="${restaurant.name}"></li>
        </ol>
    </nav>

    <div class="row g-4">
        <!-- Restaurant info -->
        <div class="col-lg-5">
            <div class="card border-0 shadow-sm h-100" style="border-radius:12px;">
                <div class="card-body">
                    <div class="d-flex align-items-center mb-3">
                        <!-- Logo -->
                        <img th:if="${restaurant.logoUrl}"
                             th:src="${restaurant.logoUrl}"
                             class="rounded-circle me-3"
                             style="width:64px;height:64px;object-fit:cover;"
                             alt="logo"/>
                        <div th:unless="${restaurant.logoUrl}"
                             class="rounded-circle d-flex align-items-center justify-content-center me-3"
                             style="width:64px;height:64px;background:#f0f0f0;font-size:1.5rem;">
                            <i class="bi bi-shop text-muted"></i>
                        </div>
                        <div>
                            <h5 class="fw-bold mb-0" th:text="${restaurant.name}"></h5>
                            <span class="badge bg-secondary" th:text="${restaurant.cuisineType}"></span>
                        </div>
                    </div>

                    <table class="table table-sm table-borderless mb-0">
                        <tr>
                            <td class="text-muted fw-semibold" style="width:40%;font-size:.85rem;">Chủ sở hữu</td>
                            <td th:text="${restaurant.owner.firstName + ' ' + restaurant.owner.lastName}"></td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-semibold" style="font-size:.85rem;">Email chủ</td>
                            <td th:text="${restaurant.owner.email}"></td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-semibold" style="font-size:.85rem;">Địa chỉ</td>
                            <td th:text="${restaurant.streetAddress + ', ' + restaurant.city}"></td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-semibold" style="font-size:.85rem;">Điện thoại</td>
                            <td th:text="${restaurant.phone}"></td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-semibold" style="font-size:.85rem;">Đánh giá TB</td>
                            <td>
                                <i class="bi bi-star-fill text-warning" style="font-size:.8rem;"></i>
                                <span th:text="${#numbers.formatDecimal(restaurant.ratingAvg ?: 0, 1, 1)}"></span>
                                (<span th:text="${restaurant.ratingCount}"></span> đánh giá)
                            </td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-semibold" style="font-size:.85rem;">Trạng thái</td>
                            <td>
                                <span th:class="${'badge me-1 ' + (restaurant.open ? 'bg-success' : 'bg-secondary')}"
                                      th:text="${restaurant.open ? 'Đang mở' : 'Đóng cửa'}"></span>
                                <span th:class="${'badge ' + (restaurant.active ? 'bg-primary' : 'bg-danger')}"
                                      th:text="${restaurant.active ? 'Kích hoạt' : 'Vô hiệu'}"></span>
                            </td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-semibold" style="font-size:.85rem;">Phí giao hàng</td>
                            <td th:text="${#numbers.formatDecimal(restaurant.deliveryFee ?: 0, 0, 'COMMA', 0, 'POINT') + 'đ'}"></td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-semibold" style="font-size:.85rem;">Ngày tạo</td>
                            <td th:text="${#temporals.format(restaurant.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                        </tr>
                    </table>

                    <!-- Action buttons -->
                    <div class="d-flex gap-2 mt-3">
                        <form method="post"
                              th:action="@{/admin/restaurants/{id}/toggle-open(id=${restaurant.id})}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit"
                                    th:class="${'btn btn-sm ' + (restaurant.open ? 'btn-outline-warning' : 'btn-outline-success')}">
                                <i th:class="${'bi me-1 ' + (restaurant.open ? 'bi-pause-circle' : 'bi-play-circle')}"></i>
                                <span th:text="${restaurant.open ? 'Đóng cửa' : 'Mở cửa'}"></span>
                            </button>
                        </form>
                        <form method="post"
                              th:action="@{/admin/restaurants/{id}/toggle-active(id=${restaurant.id})}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit"
                                    th:class="${'btn btn-sm ' + (restaurant.active ? 'btn-outline-danger' : 'btn-outline-primary')}">
                                <i th:class="${'bi me-1 ' + (restaurant.active ? 'bi-x-circle' : 'bi-check-circle')}"></i>
                                <span th:text="${restaurant.active ? 'Vô hiệu hóa' : 'Kích hoạt'}"></span>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Categories & Menu shortcut -->
        <div class="col-lg-7">
            <div class="card border-0 shadow-sm" style="border-radius:12px;">
                <div class="card-header bg-white border-0 pt-3 pb-0 d-flex justify-content-between align-items-center">
                    <h6 class="fw-bold mb-0">
                        <i class="bi bi-menu-button-wide me-2 text-warning"></i>Danh mục thực đơn
                    </h6>
                    <a th:href="@{/admin/restaurants/{id}/menu(id=${restaurant.id})}"
                       class="btn btn-sm btn-warning fw-semibold">
                        <i class="bi bi-pencil me-1"></i>Quản lý thực đơn
                    </a>
                </div>
                <div class="card-body">
                    <div th:if="${categories.empty}" class="text-muted text-center py-4">
                        Chưa có danh mục nào
                    </div>
                    <div th:each="cat : ${categories}" class="mb-2">
                        <div class="d-flex align-items-center justify-content-between p-2 rounded"
                             style="background:#f8f9fa;">
                            <div>
                                <i class="bi bi-grid me-2 text-muted"></i>
                                <span class="fw-semibold" th:text="${cat.name}"></span>
                            </div>
                            <span class="badge bg-secondary" th:text="${cat.items.size() + ' món'}"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
