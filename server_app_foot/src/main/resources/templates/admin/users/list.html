<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head><title>Người dùng — FoodRush Admin</title></head>
<body>
<div layout:fragment="content">

    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h4 class="mb-0 fw-bold">Người dùng</h4>
            <p class="text-muted mb-0" style="font-size:.85rem;">Quản lý tài khoản người dùng</p>
        </div>
    </div>

    <!-- Search form -->
    <div class="card border-0 shadow-sm mb-3" style="border-radius:12px;">
        <div class="card-body py-2">
            <form method="get" th:action="@{/admin/users}" class="d-flex gap-2 align-items-center">
                <input type="text" name="search" class="form-control form-control-sm"
                       placeholder="Tìm theo email, tên..."
                       th:value="${search}" style="max-width:320px;">
                <button class="btn btn-sm btn-warning fw-semibold" type="submit">
                    <i class="bi bi-search"></i> Tìm
                </button>
                <a th:href="@{/admin/users}" class="btn btn-sm btn-outline-secondary">Xóa lọc</a>
            </form>
        </div>
    </div>

    <!-- Users table -->
    <div class="card border-0 shadow-sm" style="border-radius:12px;">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Avatar</th>
                            <th>Email</th>
                            <th>Tên</th>
                            <th>Vai trò</th>
                            <th>Trạng thái</th>
                            <th>Đăng ký</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${users.empty}">
                            <td colspan="8" class="text-center text-muted py-4">Không tìm thấy người dùng</td>
                        </tr>
                        <tr th:each="u : ${users}">
                            <td class="text-muted" style="font-size:.8rem;" th:text="${u.id}"></td>
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <img th:if="${u.profilePictureUrl}" th:src="${u.profilePictureUrl}" alt="avatar"
                                         class="rounded-circle border" width="38" height="38" style="object-fit:cover;"/>
                                    <div th:unless="${u.profilePictureUrl}"
                                         class="rounded-circle border d-inline-flex align-items-center justify-content-center text-muted"
                                         style="width:38px;height:38px;">
                                        <i class="bi bi-person"></i>
                                    </div>
                                    <form method="post"
                                          enctype="multipart/form-data"
                                          th:action="@{/admin/users/{id}/avatar(id=${u.id})}"
                                          class="d-flex align-items-center gap-1">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <input type="file" name="avatarFile" accept="image/*"
                                               class="form-control form-control-sm" style="max-width:180px;" required>
                                        <button type="submit" class="btn btn-sm btn-outline-primary" title="Tải avatar">
                                            <i class="bi bi-upload"></i>
                                        </button>
                                    </form>
                                    <form method="post"
                                          th:action="@{/admin/users/{id}/avatar/remove(id=${u.id})}"
                                          onsubmit="return confirm('Xóa avatar của người dùng này?')">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-sm btn-outline-secondary" title="Xóa avatar">
                                            <i class="bi bi-trash3"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                            <td th:text="${u.email}"></td>
                            <td th:text="${u.firstName + ' ' + u.lastName}"></td>
                            <td>
                                <span th:class="${'badge ' +
                                    (u.role.name() == 'SYSTEM_ADMIN' ? 'bg-danger' :
                                     u.role.name() == 'RESTAURANT_ADMIN' ? 'bg-warning text-dark' : 'bg-secondary')}"
                                      th:text="${u.role.name()}"></span>
                            </td>
                            <td>
                                <span th:class="${'badge ' + (u.active ? 'bg-success' : 'bg-secondary')}"
                                      th:text="${u.active ? 'Hoạt động' : 'Đã khóa'}"></span>
                            </td>
                            <td class="text-muted" style="font-size:.82rem;"
                                th:text="${#temporals.format(u.createdAt, 'dd/MM/yyyy')}"></td>
                            <td>
                                <form method="post"
                                      th:action="@{/admin/users/{id}/toggle-active(id=${u.id})}"
                                      class="d-inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit"
                                            th:class="${'btn btn-sm ' + (u.active ? 'btn-outline-danger' : 'btn-outline-success')}"
                                            th:title="${u.active ? 'Khóa tài khoản' : 'Mở khóa'}">
                                        <i th:class="${'bi ' + (u.active ? 'bi-lock' : 'bi-unlock')}"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <div class="card-footer bg-white border-0" th:if="${users.totalPages > 1}">
            <nav>
                <ul class="pagination pagination-sm mb-0 justify-content-end">
                    <li th:class="${'page-item ' + (users.first ? 'disabled' : '')}">
                        <a class="page-link"
                           th:href="@{/admin/users(search=${search}, page=${users.number - 1})}">
                            &laquo;
                        </a>
                    </li>
                    <li th:each="i : ${#numbers.sequence(0, users.totalPages - 1)}"
                        th:class="${'page-item ' + (i == users.number ? 'active' : '')}">
                        <a class="page-link"
                           th:href="@{/admin/users(search=${search}, page=${i})}"
                           th:text="${i + 1}"></a>
                    </li>
                    <li th:class="${'page-item ' + (users.last ? 'disabled' : '')}">
                        <a class="page-link"
                           th:href="@{/admin/users(search=${search}, page=${users.number + 1})}">
                            &raquo;
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

</div>
</body>
</html>
