<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head><title>Dashboard — FoodRush Admin</title></head>
<body>
<div layout:fragment="content">

    <!-- Page header -->
    <div class="d-flex align-items-center mb-4">
        <div>
            <h4 class="mb-0 fw-bold">Dashboard</h4>
            <p class="text-muted mb-0" style="font-size:.85rem;">Tổng quan hệ thống FoodRush</p>
        </div>
    </div>

    <!-- Stat cards -->
    <div class="row g-3 mb-4">
        <!-- Total Users -->
        <div class="col-6 col-lg-3">
            <div class="card stat-card h-100 p-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <p class="text-muted mb-1" style="font-size:.8rem;">Người dùng</p>
                        <h3 class="fw-bold mb-0" th:text="${stats.totalUsers}">0</h3>
                    </div>
                    <div class="icon-box" style="background:#fff3e0;">
                        <i class="bi bi-people" style="color:#e67e22;"></i>
                    </div>
                </div>
            </div>
        </div>
        <!-- Total Restaurants -->
        <div class="col-6 col-lg-3">
            <div class="card stat-card h-100 p-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <p class="text-muted mb-1" style="font-size:.8rem;">Nhà hàng</p>
                        <h3 class="fw-bold mb-0" th:text="${stats.totalRestaurants}">0</h3>
                        <small class="text-success">
                            <i class="bi bi-circle-fill" style="font-size:.5rem;"></i>
                            <span th:text="${stats.activeRestaurants} + ' đang hoạt động'"></span>
                        </small>
                    </div>
                    <div class="icon-box" style="background:#e8f5e9;">
                        <i class="bi bi-shop" style="color:#27ae60;"></i>
                    </div>
                </div>
            </div>
        </div>
        <!-- Total Orders -->
        <div class="col-6 col-lg-3">
            <div class="card stat-card h-100 p-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <p class="text-muted mb-1" style="font-size:.8rem;">Đơn hàng</p>
                        <h3 class="fw-bold mb-0" th:text="${stats.totalOrders}">0</h3>
                        <small class="text-warning">
                            <i class="bi bi-clock"></i>
                            <span th:text="${stats.pendingOrders} + ' chờ xử lý'"></span>
                        </small>
                    </div>
                    <div class="icon-box" style="background:#e3f2fd;">
                        <i class="bi bi-bag-check" style="color:#2980b9;"></i>
                    </div>
                </div>
            </div>
        </div>
        <!-- Total Revenue -->
        <div class="col-6 col-lg-3">
            <div class="card stat-card h-100 p-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <p class="text-muted mb-1" style="font-size:.8rem;">Doanh thu</p>
                        <h3 class="fw-bold mb-0" style="font-size:1.3rem;">
                            <th:block th:text="${#numbers.formatDecimal(stats.totalRevenue, 0, 'COMMA', 0, 'POINT')}">0</th:block>đ
                        </h3>
                        <small class="text-muted">
                            Hôm nay:
                            <span th:text="${#numbers.formatDecimal(stats.revenueToday, 0, 'COMMA', 0, 'POINT')} + 'đ'"></span>
                        </small>
                    </div>
                    <div class="icon-box" style="background:#fce4ec;">
                        <i class="bi bi-currency-exchange" style="color:#c0392b;"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Second row: orders today + reviews -->
    <div class="row g-3 mb-4">
        <div class="col-6 col-lg-3">
            <div class="card stat-card p-3">
                <p class="text-muted mb-1" style="font-size:.8rem;">Đơn hôm nay</p>
                <h3 class="fw-bold mb-0" th:text="${stats.totalOrdersToday}">0</h3>
            </div>
        </div>
        <div class="col-6 col-lg-3">
            <div class="card stat-card p-3">
                <p class="text-muted mb-1" style="font-size:.8rem;">Đánh giá</p>
                <h3 class="fw-bold mb-0" th:text="${stats.totalReviews}">0</h3>
            </div>
        </div>
    </div>

    <!-- Recent orders table -->
    <div class="card border-0 shadow-sm" style="border-radius:12px;">
        <div class="card-header bg-white border-0 pt-3 pb-0">
            <h6 class="fw-bold mb-0">
                <i class="bi bi-clock-history me-2 text-warning"></i>Đơn hàng gần đây
            </h6>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Mã đơn</th>
                            <th>Khách hàng</th>
                            <th>Nhà hàng</th>
                            <th>Tổng tiền</th>
                            <th>Trạng thái</th>
                            <th>Thời gian</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${recentOrders.empty}">
                            <td colspan="7" class="text-center text-muted py-4">Chưa có đơn hàng nào</td>
                        </tr>
                        <tr th:each="o : ${recentOrders}">
                            <td class="fw-semibold" th:text="${o.orderNumber}"></td>
                            <td th:text="${o.user.firstName + ' ' + o.user.lastName}"></td>
                            <td th:text="${o.restaurant.name}"></td>
                            <td class="fw-semibold text-success">
                                <span th:text="${#numbers.formatDecimal(o.totalAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'"></span>
                            </td>
                            <td>
                                <span th:class="${'badge badge-status ' + 
                                    (o.status.name() == 'DELIVERED' ? 'bg-success' :
                                     o.status.name() == 'CANCELLED' ? 'bg-danger' :
                                     o.status.name() == 'PENDING' ? 'bg-warning text-dark' :
                                     o.status.name() == 'PREPARING' ? 'bg-info' : 'bg-primary')}"
                                      th:text="${o.status.name()}"></span>
                            </td>
                            <td class="text-muted" style="font-size:.82rem;"
                                th:text="${#temporals.format(o.createdAt, 'dd/MM HH:mm')}"></td>
                            <td>
                                <a th:href="@{/admin/orders/{id}(id=${o.id})}"
                                   class="btn btn-sm btn-outline-secondary py-0">
                                    <i class="bi bi-eye"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer bg-white border-0 text-end">
            <a th:href="@{/admin/orders}" class="btn btn-sm" style="color:#e67e22;">
                Xem tất cả đơn hàng <i class="bi bi-arrow-right"></i>
            </a>
        </div>
    </div>

</div>
</body>
</html>
