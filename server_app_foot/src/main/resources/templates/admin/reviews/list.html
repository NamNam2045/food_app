<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head><title>Đánh giá — FoodRush Admin</title></head>
<body>
<div layout:fragment="content">

    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h4 class="mb-0 fw-bold">Đánh giá</h4>
            <p class="text-muted mb-0" style="font-size:.85rem;">Kiểm duyệt đánh giá người dùng</p>
        </div>
    </div>

    <div class="card border-0 shadow-sm" style="border-radius:12px;">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Nhà hàng</th>
                            <th>Người dùng</th>
                            <th>Đánh giá</th>
                            <th>Nội dung</th>
                            <th>Hiển thị</th>
                            <th>Ngày</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${reviews.empty}">
                            <td colspan="7" class="text-center text-muted py-4">Chưa có đánh giá nào</td>
                        </tr>
                        <tr th:each="rv : ${reviews}">
                            <td>
                                <a th:href="@{/admin/restaurants/{id}(id=${rv.restaurant.id})}"
                                   class="text-decoration-none fw-semibold"
                                   th:text="${rv.restaurant.name}"></a>
                            </td>
                            <td>
                                <div th:text="${rv.user.firstName + ' ' + rv.user.lastName}" style="font-size:.9rem;"></div>
                                <div class="text-muted" style="font-size:.78rem;" th:text="${rv.user.email}"></div>
                            </td>
                            <td>
                                <th:block th:each="i : ${#numbers.sequence(1, 5)}">
                                    <i th:class="${'bi ' + (i <= rv.rating ? 'bi-star-fill text-warning' : 'bi-star text-muted')}"
                                       style="font-size:.8rem;"></i>
                                </th:block>
                                <span class="ms-1 fw-semibold" th:text="${rv.rating}"></span>
                            </td>
                            <td style="max-width:200px;">
                                <span th:text="${#strings.abbreviate(rv.comment ?: '', 80)}"
                                      style="font-size:.82rem;"></span>
                            </td>
                            <td>
                                <span th:class="${'badge ' + (rv.visible ? 'bg-success' : 'bg-secondary')}"
                                      th:text="${rv.visible ? 'Hiển thị' : 'Ẩn'}"></span>
                            </td>
                            <td class="text-muted" style="font-size:.82rem;"
                                th:text="${#temporals.format(rv.createdAt, 'dd/MM/yyyy')}"></td>
                            <td>
                                <form method="post"
                                      th:action="@{/admin/reviews/{id}/toggle-visible(id=${rv.id})}">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit"
                                            th:class="${'btn btn-sm ' + (rv.visible ? 'btn-outline-secondary' : 'btn-outline-success')}"
                                            th:title="${rv.visible ? 'Ẩn đánh giá' : 'Hiện đánh giá'}">
                                        <i th:class="${'bi ' + (rv.visible ? 'bi-eye-slash' : 'bi-eye')}"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <div class="card-footer bg-white border-0" th:if="${reviews.totalPages > 1}">
            <nav>
                <ul class="pagination pagination-sm mb-0 justify-content-end">
                    <li th:class="${'page-item ' + (reviews.first ? 'disabled' : '')}">
                        <a class="page-link"
                           th:href="@{/admin/reviews(page=${reviews.number - 1})}">&laquo;</a>
                    </li>
                    <li th:each="i : ${#numbers.sequence(0, reviews.totalPages - 1)}"
                        th:class="${'page-item ' + (i == reviews.number ? 'active' : '')}">
                        <a class="page-link"
                           th:href="@{/admin/reviews(page=${i})}"
                           th:text="${i + 1}"></a>
                    </li>
                    <li th:class="${'page-item ' + (reviews.last ? 'disabled' : '')}">
                        <a class="page-link"
                           th:href="@{/admin/reviews(page=${reviews.number + 1})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

</div>
</body>
</html>
