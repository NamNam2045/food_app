<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>FoodRush Admin — Đăng nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
            min-height: 100vh;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,.4);
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(135deg, #e67e22, #d35400);
            padding: 2rem;
            text-align: center;
            color: #fff;
        }
        .login-header .logo { font-size: 2.5rem; margin-bottom: .4rem; }
        .login-header h1 { font-size: 1.4rem; font-weight: 700; margin: 0; }
        .form-control:focus { border-color: #e67e22; box-shadow: 0 0 0 .2rem rgba(230,126,34,.2); }
        .btn-login {
            background: linear-gradient(135deg, #e67e22, #d35400);
            border: none;
            color: #fff;
            font-weight: 600;
            letter-spacing: .04em;
            transition: opacity .2s;
        }
        .btn-login:hover { opacity: .9; color: #fff; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center p-3">
<div style="width: 100%; max-width: 420px;">
    <div class="login-card">
        <div class="login-header">
            <div class="logo"><i class="bi bi-fire"></i></div>
            <h1>FoodRush Admin</h1>
            <p class="mb-0 opacity-75" style="font-size:.9rem;">Bảng điều khiển quản trị</p>
        </div>
        <div class="p-4">
            <!-- Error -->
            <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center mb-3">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                Email hoặc mật khẩu không chính xác. Vui lòng thử lại.
            </div>
            <!-- Logout success -->
            <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center mb-3">
                <i class="bi bi-check-circle-fill me-2"></i>
                Bạn đã đăng xuất thành công.
            </div>

            <form th:action="@{/admin/login}" method="post">
                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold">Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" id="email" name="email" class="form-control"
                               placeholder="admin@foodrush.vn" required autofocus/>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold">Mật khẩu</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" id="password" name="password" class="form-control"
                               placeholder="••••••••" required/>
                    </div>
                </div>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-login w-100 py-2">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Đăng nhập
                </button>
            </form>
        </div>
    </div>
    <p class="text-center text-white-50 mt-3" style="font-size:.8rem;">
        © 2026 FoodRush. Dành cho SYSTEM_ADMIN.
    </p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
