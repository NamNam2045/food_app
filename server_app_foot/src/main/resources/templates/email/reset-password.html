<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8"/>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header { background: #FF5722; padding: 30px; text-align: center; }
        .header h1 { color: #fff; margin: 0; font-size: 24px; }
        .body { padding: 30px; color: #333; }
        .btn { display: inline-block; background: #FF5722; color: #fff; text-decoration: none; padding: 12px 30px; border-radius: 5px; font-size: 16px; margin: 20px 0; }
        .footer { padding: 20px; text-align: center; font-size: 12px; color: #999; background: #f9f9f9; }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>🍜 FoodRush</h1></div>
    <div class="body">
        <h2>Xin chào <span th:text="${firstName}">bạn</span>!</h2>
        <p>Bạn đã yêu cầu đặt lại mật khẩu. Nhấn vào nút bên dưới để tạo mật khẩu mới:</p>
        <div style="text-align:center;">
            <a class="btn" th:href="${resetLink}">Đặt lại mật khẩu</a>
        </div>
        <p>Link này sẽ hết hạn sau <strong th:text="${expiryMinutes}">30</strong> phút.</p>
        <p>Nếu bạn không yêu cầu đặt lại mật khẩu, hãy bỏ qua email này.</p>
    </div>
    <div class="footer">© 2026 FoodRush. Mọi quyền được bảo lưu.</div>
</div>
</body>
</html>
