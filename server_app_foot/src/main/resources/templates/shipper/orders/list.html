<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{shipper/layout}">
<head><title>Đơn hàng — Shipper Portal</title></head>
<body>
<div layout:fragment="content">

    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h4 class="mb-0 fw-bold">Đơn hàng của tôi</h4>
            <p class="text-muted mb-0" style="font-size:.85rem;">Lịch sử nhận đơn</p>
        </div>
    </div>

    <div class="card border-0 shadow-sm" style="border-radius:12px;">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Mã đơn</th>
                        <th>Khách hàng</th>
                        <th>Nhà hàng</th>
                        <th>Tổng tiền</th>
                        <th>Trạng thái</th>
                        <th>Thời gian</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${orders.empty}">
                        <td colspan="7" class="text-center text-muted py-5">Chưa có đơn hàng nào</td>
                    </tr>
                    <tr th:each="o : ${orders}">
                        <td class="fw-semibold" th:text="${o.orderNumber}"></td>
                        <td th:text="${o.user.firstName + ' ' + o.user.lastName}"></td>
                        <td th:text="${o.restaurant.name}"></td>
                        <td class="fw-semibold text-success"
                            th:text="${#numbers.formatDecimal(o.totalAmount, 0, 'COMMA', 0, 'POINT') + 'đ'}"></td>
                        <td>
                            <span th:class="${'badge ' +
                                (o.status.name() == 'DELIVERED'       ? 'bg-success' :
                                 o.status.name() == 'ON_THE_WAY'      ? 'bg-primary' :
                                 o.status.name() == 'PICKED_UP'       ? 'bg-info text-dark' :
                                 o.status.name() == 'CANCELLED'       ? 'bg-danger'  : 'bg-secondary')}"
                                  th:text="${o.status.name()}"></span>
                        </td>
                        <td class="text-muted" style="font-size:.82rem;"
                            th:text="${#temporals.format(o.createdAt, 'dd/MM HH:mm')}"></td>
                        <td>
                            <a th:href="@{/shipper/orders/{id}(id=${o.id})}"
                               class="btn btn-sm btn-outline-primary"><i class="bi bi-eye"></i></a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div th:if="${orders.totalPages > 1}" class="card-footer bg-white border-top-0 pt-0 pb-3 px-3">
            <nav>
                <ul class="pagination pagination-sm mb-0 justify-content-center">
                    <li th:class="${'page-item ' + (orders.first ? 'disabled' : '')}">
                        <a class="page-link" th:href="@{/shipper/orders(page=${orders.number - 1})}">
                            <i class="bi bi-chevron-left"></i>
                        </a>
                    </li>
                    <li th:each="i : ${#numbers.sequence(0, orders.totalPages - 1)}"
                        th:class="${'page-item ' + (i == orders.number ? 'active' : '')}">
                        <a class="page-link" th:href="@{/shipper/orders(page=${i})}" th:text="${i + 1}"></a>
                    </li>
                    <li th:class="${'page-item ' + (orders.last ? 'disabled' : '')}">
                        <a class="page-link" th:href="@{/shipper/orders(page=${orders.number + 1})}">
                            <i class="bi bi-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

</div>
</body>
</html>
