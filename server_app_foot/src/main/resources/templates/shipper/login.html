<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đăng nhập — FoodRush Shipper</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>
        body { background: linear-gradient(135deg,#1a252f 0%,#2980b9 100%); min-height: 100vh;
               display: flex; align-items: center; justify-content: center; }
        .login-card { border: none; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,.2);
                      max-width: 400px; width: 100%; }
        .login-card .card-header {
            background: linear-gradient(135deg,#2980b9,#3498db);
            border-radius: 16px 16px 0 0; color: #fff; text-align: center; padding: 2rem 1.5rem;
        }
        .btn-login { background: #2980b9; border-color: #2980b9; font-weight: 600; padding: .6rem; }
        .btn-login:hover { background: #2471a3; border-color: #2471a3; }
    </style>
</head>
<body>
<div class="login-card card mx-3">
    <div class="card-header">
        <i class="bi bi-truck" style="font-size:2.5rem;"></i>
        <h4 class="mt-2 mb-0 fw-bold">Shipper Portal</h4>
        <p class="mb-0 opacity-75" style="font-size:.85rem;">FoodRush Delivery Agent</p>
    </div>
    <div class="card-body p-4">
        <div th:if="${param.error}" class="alert alert-danger py-2" style="font-size:.85rem;">
            <i class="bi bi-exclamation-triangle me-1"></i> Email hoặc mật khẩu không đúng.
        </div>
        <div th:if="${param.logout}" class="alert alert-success py-2" style="font-size:.85rem;">
            <i class="bi bi-check-circle me-1"></i> Đăng xuất thành công.
        </div>
        <form th:action="@{/shipper/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="mb-3">
                <label class="form-label fw-semibold" style="font-size:.9rem;">Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" name="email" class="form-control"
                           placeholder="tai@shipper.vn" required autofocus/>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold" style="font-size:.9rem;">Mật khẩu</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control"
                           placeholder="••••••••" required/>
                </div>
            </div>
            <button type="submit" class="btn btn-login btn-primary w-100 text-white">
                <i class="bi bi-box-arrow-in-right me-1"></i> Đăng nhập
            </button>
        </form>
    </div>
</div>
</body>
</html>
