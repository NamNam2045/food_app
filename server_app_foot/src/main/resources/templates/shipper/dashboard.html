<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{shipper/layout}">
<head><title>Dashboard — Shipper Portal</title></head>
<body>
<div layout:fragment="content">

    <div class="d-flex align-items-center mb-4">
        <div>
            <h4 class="mb-0 fw-bold">Dashboard</h4>
            <p class="text-muted mb-0" style="font-size:.85rem;">Quản lý giao hàng của bạn</p>
        </div>
    </div>

    <!-- Stats -->
    <div class="row g-3 mb-4">
        <div class="col-6 col-lg-4">
            <div class="card stat-card p-3 h-100">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <p class="text-muted mb-1" style="font-size:.8rem;">Đã giao thành công</p>
                        <h3 class="fw-bold mb-0 text-success" th:text="${stats.totalDelivered}">0</h3>
                    </div>
                    <div class="icon-box" style="background:#e8f5e9;">
                        <i class="bi bi-check-circle" style="color:#27ae60;"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-6 col-lg-4">
            <div class="card stat-card p-3 h-100">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <p class="text-muted mb-1" style="font-size:.8rem;">Đang giao</p>
                        <h3 class="fw-bold mb-0 text-primary" th:text="${stats.activeDeliveries}">0</h3>
                    </div>
                    <div class="icon-box" style="background:#e3f2fd;">
                        <i class="bi bi-truck" style="color:#2980b9;"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-6 col-lg-4">
            <div class="card stat-card p-3 h-100">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <p class="text-muted mb-1" style="font-size:.8rem;">Chờ lấy hàng</p>
                        <h3 class="fw-bold mb-0 text-warning" th:text="${stats.availableOrders.size()}">0</h3>
                    </div>
                    <div class="icon-box" style="background:#fff3e0;">
                        <i class="bi bi-box-seam" style="color:#e67e22;"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Active deliveries -->
    <div th:if="${!stats.activeOrders.empty}" class="card border-0 shadow-sm mb-4" style="border-radius:12px;">
        <div class="card-header bg-white border-0 pt-3 pb-0">
            <h6 class="fw-bold mb-0">
                <i class="bi bi-truck me-2 text-primary"></i>Đơn đang giao
            </h6>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr><th>Mã đơn</th><th>Khách hàng</th><th>Nhà hàng</th><th>Tổng tiền</th><th>Trạng thái</th><th></th></tr>
                </thead>
                <tbody>
                    <tr th:each="o : ${stats.activeOrders}">
                        <td class="fw-semibold" th:text="${o.orderNumber}"></td>
                        <td th:text="${o.user.firstName + ' ' + o.user.lastName}"></td>
                        <td th:text="${o.restaurant.name}"></td>
                        <td class="fw-semibold text-success"
                            th:text="${#numbers.formatDecimal(o.totalAmount, 0, 'COMMA', 0, 'POINT') + 'đ'}"></td>
                        <td>
                            <span th:class="${'badge ' + (o.status.name() == 'ON_THE_WAY' ? 'bg-primary' : 'bg-secondary')}"
                                  th:text="${o.status.name()}"></span>
                        </td>
                        <td>
                            <a th:href="@{/shipper/orders/{id}(id=${o.id})}"
                               class="btn btn-sm btn-outline-primary"><i class="bi bi-eye"></i></a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Available for pickup -->
    <div class="card border-0 shadow-sm" style="border-radius:12px;">
        <div class="card-header bg-white border-0 pt-3 pb-0">
            <h6 class="fw-bold mb-0">
                <i class="bi bi-box-seam me-2 text-warning"></i>Đơn sẵn sàng lấy
            </h6>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr><th>Mã đơn</th><th>Khách hàng</th><th>Nhà hàng</th><th>Tổng tiền</th><th>Thời gian</th><th></th></tr>
                </thead>
                <tbody>
                    <tr th:if="${stats.availableOrders.empty}">
                        <td colspan="6" class="text-center text-muted py-4">Không có đơn nào chờ lấy</td>
                    </tr>
                    <tr th:each="o : ${stats.availableOrders}">
                        <td class="fw-semibold" th:text="${o.orderNumber}"></td>
                        <td th:text="${o.user.firstName + ' ' + o.user.lastName}"></td>
                        <td th:text="${o.restaurant.name}"></td>
                        <td class="fw-semibold text-success"
                            th:text="${#numbers.formatDecimal(o.totalAmount, 0, 'COMMA', 0, 'POINT') + 'đ'}"></td>
                        <td class="text-muted" style="font-size:.82rem;"
                            th:text="${#temporals.format(o.createdAt, 'dd/MM HH:mm')}"></td>
                        <td>
                            <form th:action="@{/shipper/orders/{id}/accept(id=${o.id})}" method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-success">
                                    <i class="bi bi-check-lg me-1"></i>Nhận đơn
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
