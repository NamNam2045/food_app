<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="'Lỗi ' + ${status} + ' — FoodRush'">Lỗi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
        }
        .error-card {
            background: #fff;
            color: #2c3e50;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,.4);
            overflow: hidden;
            max-width: 520px;
            width: 100%;
        }
        .error-header {
            background: linear-gradient(135deg, #e67e22, #d35400);
            padding: 2.2rem 1.5rem;
            text-align: center;
            color: #fff;
        }
        .error-header .icon { font-size: 3.4rem; line-height: 1; }
        .error-header .code { font-size: 3rem; font-weight: 800; letter-spacing: .04em; margin-top: .25rem; }
        .error-header .title { font-size: 1.1rem; font-weight: 600; opacity: .95; margin-top: .25rem; }
        .error-body { padding: 1.8rem 1.6rem; }
        .error-body .desc { color: #4a5568; font-size: 1rem; }
        .error-body .meta { color: #94a3b8; font-size: .82rem; margin-top: 1rem; word-break: break-all; }
        .btn-primary-c {
            background: linear-gradient(135deg, #e67e22, #d35400);
            border: none; color: #fff; font-weight: 600;
        }
        .btn-primary-c:hover { opacity: .9; color: #fff; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center p-3">
<div class="error-card">
    <div class="error-header">
        <div class="icon"><i th:class="${icon}"></i></div>
        <div class="code" th:text="${status}">500</div>
        <div class="title" th:text="${title}">Đã xảy ra lỗi</div>
    </div>
    <div class="error-body text-center">
        <p class="desc" th:text="${message}">Đã xảy ra lỗi.</p>
        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center mt-3">
            <a th:href="${loginPath}" class="btn btn-primary-c px-4">
                <i class="bi bi-box-arrow-in-right me-1"></i> Đăng nhập lại
            </a>
            <a href="javascript:history.back()" class="btn btn-outline-secondary px-4">
                <i class="bi bi-arrow-left me-1"></i> Quay lại
            </a>
        </div>
        <div class="meta">
            <div th:if="${path}">Đường dẫn: <span th:text="${path}"></span></div>
            <div th:if="${timestamp}" th:text="${#dates.format(timestamp, 'dd/MM/yyyy HH:mm:ss')}"></div>
        </div>
    </div>
</div>
</body>
</html>
